apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
    # RollingUpdate briefly runs two replicas, which fails to schedule on
    # resource-constrained single-node clusters (Insufficient cpu/memory).
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret.name }}
      containers:
        - name: vllm
          image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
          ports:
            - containerPort: {{ .Values.vllm.port }}
          env:
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "{{ .Values.vllm.kvCacheSpaceGB }}"
            - name: TORCHDYNAMO_DISABLE
              value: "1"
              # Required on this image's PyTorch install — without it,
              # torch.compile attempts a C++ kernel build that fails due to
              # a missing header (torch/csrc/inductor/cpp_prefix.h).
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.vllm.port }}
            failureThreshold: 60
            periodSeconds: 10
            # 10-minute budget — CPU model load + warmup has been observed
            # taking several minutes; a shorter budget kills the pod before
            # it finishes starting.
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.vllm.port }}
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.vllm.port }}
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: vllm-server
  ports:
    - port: {{ .Values.vllm.port }}
      targetPort: {{ .Values.vllm.port }}
  type: ClusterIP
