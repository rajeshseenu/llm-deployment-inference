apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-website-ingress
  namespace: {{ .Values.namespace }}
spec:
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-website-service
                port:
                  number: 80
