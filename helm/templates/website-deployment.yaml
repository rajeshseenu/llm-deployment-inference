apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-website
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.website.replicas }}
  selector:
    matchLabels:
      app: chat-website
  template:
    metadata:
      labels:
        app: chat-website
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret.name }}
      containers:
        - name: website
          image: "{{ .Values.website.image }}"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: chat-website-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: chat-website
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
